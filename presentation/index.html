<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcement Bar App — Đồ án cuối khóa</title>
    <style>
      :root {
        --bg: #0a0e16;
        --bg2: #0e1422;
        --panel: #10182a;
        --panel2: #0c1322;
        --ink: #e6edfb;
        --body: #c8d3e6;
        --muted: #8693ad;
        --line: #1f2c47;
        --green: #3ddc84;
        --cyan: #7fd3ff;
        --amber: #ffc66b;
        --magenta: #e58fd8;
        --code-bg: #070b13;
        --chrome: #0b1220;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family:
          ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Liberation Mono",
          monospace;
        background: var(--bg);
        color: var(--body);
        overflow: hidden;
      }
      /* scanline + subtle grid texture (CSS only, low opacity) */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background-image:
          linear-gradient(rgba(61, 220, 132, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(61, 220, 132, 0.025) 1px, transparent 1px);
        background-size: 34px 34px;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.35;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0.16) 3px,
          rgba(0, 0, 0, 0) 4px
        );
      }

      .deck {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 34px 40px 76px;
        z-index: 2;
      }

      /* terminal window frame */
      .slide {
        display: none;
        width: 100%;
        max-width: 1120px;
        max-height: 100%;
        background: linear-gradient(180deg, var(--panel), var(--panel2));
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(61, 220, 132, 0.05) inset;
        animation: fade 0.3s ease;
      }
      .slide.active {
        display: flex;
        flex-direction: column;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .winbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        background: var(--chrome);
        border-bottom: 1px solid var(--line);
        padding: 9px 14px;
      }
      .lights {
        display: flex;
        gap: 7px;
      }
      .lt {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }
      .lt.r {
        background: #ff5f57;
      }
      .lt.y {
        background: #febc2e;
      }
      .lt.g {
        background: #28c840;
      }
      .wintab {
        font-size: 13px;
        color: #94a6c9;
        letter-spacing: 0.01em;
      }
      .wintab .pmt {
        color: var(--green);
      }
      .wintab .pth {
        color: var(--cyan);
      }

      .body {
        padding: 26px 34px;
        overflow: auto;
        flex: 1;
      }
      .body::-webkit-scrollbar {
        width: 9px;
        height: 9px;
      }
      .body::-webkit-scrollbar-thumb {
        background: #243355;
        border-radius: 6px;
      }

      .statusbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        background: #0a101c;
        border-top: 1px solid var(--line);
        padding: 6px 16px;
        font-size: 11.5px;
        color: #6f7da0;
        letter-spacing: 0.02em;
      }
      .statusbar .mode {
        color: #0a0e16;
        background: var(--green);
        font-weight: 700;
        padding: 1px 8px;
        border-radius: 3px;
      }
      .statusbar .ok {
        color: var(--green);
      }

      /* shell comment eyebrow */
      .eyebrow {
        display: inline-block;
        font-size: 12.5px;
        letter-spacing: 0.06em;
        color: var(--green);
        margin-bottom: 14px;
        font-weight: 600;
      }
      .eyebrow::before {
        content: "# ";
        color: var(--muted);
      }

      h1 {
        font-size: 46px;
        line-height: 1.06;
        margin: 0.05em 0 0.2em;
        font-weight: 800;
        letter-spacing: -0.01em;
        color: #fff;
      }
      h2 {
        font-size: 36px;
        line-height: 1.12;
        margin: 0 0 0.45em;
        font-weight: 800;
        letter-spacing: -0.01em;
        color: #fff;
      }
      h2 .pmt {
        color: var(--green);
        font-weight: 700;
      }
      h3 {
        font-size: 18px;
        margin: 0 0 0.35em;
        font-weight: 700;
        color: var(--cyan);
      }
      p {
        font-size: 17px;
        line-height: 1.55;
        color: var(--body);
        margin: 0.45em 0;
      }
      .lead {
        font-size: 19px;
        color: var(--muted);
        line-height: 1.5;
      }
      strong {
        color: #fff;
        font-weight: 700;
      }
      .muted {
        color: var(--muted);
      }
      .grn {
        color: var(--green);
      }
      .cyn {
        color: var(--cyan);
      }
      .amb {
        color: var(--amber);
      }
      .mag {
        color: var(--magenta);
      }

      ul {
        margin: 0.3em 0;
        padding-left: 0;
        list-style: none;
      }
      li {
        font-size: 16.5px;
        line-height: 1.5;
        margin: 0.5em 0;
        color: var(--body);
        padding-left: 1.5em;
        position: relative;
      }
      li::before {
        content: "▸";
        position: absolute;
        left: 0;
        color: var(--cyan);
      }
      li.ok::before {
        content: "✓";
        color: var(--green);
      }
      li.warn::before {
        content: "!";
        color: var(--amber);
        font-weight: 800;
      }
      li b,
      li strong {
        color: #fff;
      }

      .cursor {
        display: inline-block;
        width: 11px;
        height: 1.05em;
        background: var(--green);
        vertical-align: -2px;
        margin-left: 3px;
        animation: blink 1.05s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .grid {
        display: grid;
        gap: 16px;
      }
      .g2 {
        grid-template-columns: 1fr 1fr;
      }
      .g3 {
        grid-template-columns: repeat(3, 1fr);
      }
      .card {
        background: var(--code-bg);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 18px;
      }
      .card h3 {
        margin-bottom: 0.4em;
      }
      .card.grn {
        border-color: #1d6b43;
      }
      .card.cyn {
        border-color: #1f5a7d;
      }
      .card.amb {
        border-color: #7d6630;
      }
      .card.mag {
        border-color: #6b3a63;
      }

      .chip {
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 5px;
        margin: 2px 3px 2px 0;
        background: rgba(127, 211, 255, 0.08);
        color: var(--cyan);
        border: 1px solid #1f5a7d;
      }
      .chip.g {
        background: rgba(61, 220, 132, 0.08);
        color: var(--green);
        border-color: #1d6b43;
      }
      .chip.a {
        background: rgba(255, 198, 107, 0.08);
        color: var(--amber);
        border-color: #7d6630;
      }
      .chip.m {
        background: rgba(229, 143, 216, 0.08);
        color: var(--magenta);
        border-color: #6b3a63;
      }

      /* code/output block */
      .term {
        background: var(--code-bg);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 14px 16px;
        font-size: 14px;
        line-height: 1.6;
        color: #cfe;
        overflow: auto;
        margin: 0.5em 0;
      }
      .term .c {
        color: var(--muted);
      } /* comment */
      .term .p {
        color: var(--green);
      } /* prompt */
      .term .o {
        color: var(--body);
      } /* output */
      .term .ok {
        color: var(--green);
      }
      .term .warn {
        color: var(--amber);
      }
      .term .err {
        color: #ff7a7a;
      }
      .term pre {
        margin: 0;
        font: inherit;
        white-space: pre;
      }
      .ascii {
        background: var(--code-bg);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 14px 16px;
        font-size: 12.5px;
        line-height: 1.45;
        color: #bfe6ff;
        white-space: pre;
        overflow: auto;
      }
      .ascii .lbl {
        color: var(--green);
      }
      .ascii .ar {
        color: var(--amber);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 15px;
      }
      th,
      td {
        text-align: left;
        padding: 9px 11px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      th {
        color: var(--green);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-weight: 700;
      }
      td.k {
        color: var(--cyan);
      }
      td.m {
        font-family: inherit;
        color: var(--body);
      }

      /* DAG */
      .dag {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        align-items: center;
        font-size: 13px;
      }
      .node {
        background: #0d1626;
        border: 1px solid #2a3a5e;
        border-radius: 7px;
        padding: 6px 10px;
        color: #cfe;
      }
      .node.done {
        background: #0f2b20;
        border-color: #1d6b43;
        color: var(--green);
      }
      .node.done::before {
        content: "✓ ";
      }
      .node.opt {
        border-style: dashed;
        color: var(--muted);
      }
      .arrow {
        color: #4a5a82;
      }

      .kv {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 16px;
        font-size: 15.5px;
        margin: 0.4em 0;
      }
      .kv .key {
        color: var(--green);
      }

      .note {
        background: rgba(255, 198, 107, 0.05);
        border: 1px solid #7d6630;
        border-radius: 9px;
        padding: 13px 16px;
        margin: 0.5em 0;
      }
      .note h3 {
        color: var(--amber);
      }
      .why {
        background: rgba(61, 220, 132, 0.05);
        border: 1px solid #1d6b43;
        border-radius: 9px;
        padding: 13px 16px;
        margin: 0.5em 0;
      }
      .why h3 {
        color: var(--green);
      }

      /* title */
      .title-body {
        justify-content: center;
      }
      .title-body h1 {
        font-size: 60px;
        background: linear-gradient(92deg, #fff, #7fd3ff 50%, #3ddc84);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .author {
        margin-top: 30px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .badge {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 14px;
        font-size: 14px;
        color: var(--body);
      }
      .badge b {
        color: var(--green);
      }

      /* nav chrome */
      .progress {
        position: fixed;
        left: 0;
        top: 0;
        height: 3px;
        background: linear-gradient(90deg, #7fd3ff, #3ddc84);
        z-index: 30;
        transition: width 0.3s ease;
        width: 0;
      }
      .navbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 54px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 22px;
        background: linear-gradient(
          0deg,
          rgba(7, 11, 19, 0.97),
          rgba(7, 11, 19, 0.6)
        );
        border-top: 1px solid var(--line);
        backdrop-filter: blur(6px);
        z-index: 20;
      }
      .nbtn {
        font: inherit;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        color: var(--ink);
        background: #13203a;
        border: 1px solid #2a3a5e;
        border-radius: 7px;
        padding: 7px 13px;
      }
      .nbtn:hover {
        background: #1a2c4c;
      }
      .nbtn:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .counter {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--cyan);
        font-size: 13px;
        min-width: 62px;
        text-align: center;
      }
      .hint {
        font-size: 11.5px;
        color: #5a678a;
      }
      .decktag {
        font-size: 12px;
        color: var(--muted);
        margin-left: auto;
      }
      .decktag .grn {
        color: var(--green);
      }

      @media (max-width: 860px) {
        .deck {
          padding: 14px 12px 70px;
        }
        .body {
          padding: 18px 18px;
        }
        h1 {
          font-size: 30px;
        }
        .title-body h1 {
          font-size: 34px;
        }
        h2 {
          font-size: 24px;
        }
        .g2,
        .g3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="progress" id="progress"></div>
    <div class="deck" id="deck"></div>

    <div class="navbar">
      <button class="nbtn" id="prev">‹ prev</button>
      <button class="nbtn" id="next">next ›</button>
      <span class="counter" id="counter">1 / 1</span>
      <span class="hint">← → / Space · Home/End · #sN deep-link</span>
      <span class="decktag"
        >announcement-bar-app · <span class="grn">init.sh: GREEN</span></span
      >
      <!-- chú thích: text điều hướng giữ nguyên dạng phím tắt -->
    </div>

    <script>
      /* ---------- helpers ---------- */
      const slides = [];
      /* slide(tab, innerHTML, statusbarRight)  -> wraps in terminal-window frame */
      function slide(tab, html, status) {
        const st = status || 'init.sh: <span class="ok">GREEN</span>';
        slides.push(
          '<section class="slide">' +
            '<div class="winbar"><span class="lights"><span class="lt r"></span><span class="lt y"></span><span class="lt g"></span></span>' +
            '<span class="wintab">' +
            tab +
            "</span></div>" +
            '<div class="body">' +
            html +
            "</div>" +
            '<div class="statusbar"><span class="mode">-- NORMAL --</span>' +
            '<span>announcement-bar-app</span><span>main <span class="ok">✓</span></span>' +
            '<span style="margin-left:auto">' +
            st +
            "</span></div>" +
            "</section>",
        );
      }
      function tab(file, label) {
        return (
          '<span class="pmt">~/announcement-bar-app $</span> <span class="pth">' +
          file +
          "</span> — " +
          label
        );
      }

      /* ============================ SLIDE 1 — TITLE ============================ */
      slide(
        tab("slide-01", "title"),
        '<div class="body title-body" style="padding:0">' +
          '<div class="eyebrow">Khóa học AI Coding — Đồ án cuối khóa</div>' +
          "<h1>Announcement Bar App</h1>" +
          '<p class="lead" style="max-width:780px">Một Shopify embedded app để quản lý nhiều thanh thông báo đã lưu ' +
          '— <span class="grn">mỗi lần chỉ bật đúng một thanh</span> — hiển thị dính (sticky) trên storefront kèm đồng hồ đếm ngược chạy thật. ' +
          'Xây dựng bằng một <span class="cyn">AI harness</span> kỷ luật.<span class="cursor"></span></p>' +
          '<div class="author">' +
          /* EDIT presenter name here */
          '<span class="badge">người trình bày: <b>Nguyễn Hoa Sơn</b></span>' +
          '<span class="badge">Khóa học AI Coding — Đồ án cuối khóa</span>' +
          '<span class="badge">Shopify app 3 tầng</span>' +
          '<span class="badge">Go · React · Webpack</span>' +
          "</div></div>",
        'nhấn <span class="ok">→</span> để bắt đầu',
      );

      /* ============================ SLIDE 2 — AGENDA ============================ */
      slide(
        tab("slide-02", "agenda"),
        '<div class="eyebrow">những nội dung sẽ trình bày — theo 6 câu hỏi</div>' +
          '<h2><span class="pmt">$</span> cat agenda.md</h2>' +
          '<div class="grid g2">' +
          "<ul>" +
          '<li class="ok"><b>1 · Mục tiêu</b> — app làm được gì</li>' +
          '<li class="ok"><b>2 · Kiến thức áp dụng</b> — harness 5 file lõi · brainstorm→DAG · tech stack</li>' +
          '<li class="ok"><b>3 · AI/Harness hỗ trợ</b> — TDD → verify → debug</li>' +
          "</ul>" +
          "<ul>" +
          '<li class="ok"><b>4 · Kết quả</b> &amp; sản phẩm bàn giao</li>' +
          '<li class="ok"><b>5 · Khó khăn</b> &amp; cách xử lý</li>' +
          '<li class="ok"><b>6 · Bài học rút ra</b> · Hỏi-đáp</li>' +
          "</ul>" +
          "</div>",
      );

      /* ============================ SLIDE 3 — GOAL ============================ */
      slide(
        tab("slide-03", "goal"),
        '<div class="eyebrow">mục tiêu — app làm được gì</div>' +
          "<h2>Một thanh thông báo có style ở đầu cửa hàng</h2>" +
          '<p class="lead">Một cách nhanh, không cần code để merchant Shopify hiển thị một thanh thông báo có style — ' +
          "kèm đồng hồ đếm ngược tùy chọn — gõ nội dung trong admin, hiện ngay trên store, và tự gỡ khi khuyến mãi kết thúc.</p>" +
          '<div class="grid g2" style="margin-top:14px">' +
          '<div class="card grn"><h3>Mô hình</h3><ul>' +
          '<li class="ok">Một shop lưu <b>nhiều</b> thanh (CRUD đầy đủ)</li>' +
          '<li class="ok"><b>Tối đa MỘT thanh được bật</b> tại một thời điểm</li>' +
          '<li class="ok">Thanh đang bật hiển thị <b>trên toàn site</b> ở đầu trang</li>' +
          '<li class="ok"><b>Đồng hồ đếm ngược theo ngày cố định</b> (tùy chọn)</li>' +
          "</ul></div>" +
          '<div class="card cyn"><h3>Merchant mục tiêu</h3>' +
          "<p>Merchant Shopify nhỏ và vừa đang chạy <b>khuyến mãi có thời hạn</b> — flash sale, " +
          "hạn chót miễn phí ship, ưu đãi dịp lễ — muốn tự cấu hình một thanh thông báo " +
          "mà không phải sửa code theme hay thuê developer.</p></div>" +
          "</div>" +
          '<div class="note"><h3>Chủ đích làm gọn (ngoài phạm vi)</h3>' +
          '<p style="margin:0">Không xếp chồng / xoay vòng, không nhắm theo từng trang, không hẹn giờ bật, không nút CTA hay nút tắt "X". ' +
          "Nhiều thanh được <b>lưu</b>; đúng một thanh được <b>hiển thị</b>. Cách này giữ luồng dữ liệu nhỏ gọn và dễ demo.</p></div>",
      );

      /* ============================ SLIDE 4 — THESIS ============================ */
      slide(
        tab("slide-04", "phương-pháp"),
        '<div class="eyebrow">[2] kiến thức áp dụng — phương pháp luận + harness</div>' +
          "<h2>Coi AI như junior giỏi → bọc một harness quanh nó</h2>" +
          '<p class="lead" style="margin-bottom:10px">Đừng "prompt rồi cầu may". Bọc một <span class="grn">harness</span>: luật rõ, phạm vi đã hoạch định, ' +
          'guardrails tự động, "có bằng chứng mới coi là xong" — để tốc độ AI không biến thành cẩu thả.</p>' +
          "<table>" +
          "<tr><th>Phân hệ (5 file lõi)</th><th>Trả lời câu hỏi gì</th><th>Nằm ở đâu</th></tr>" +
          '<tr><td class="k">Guidance</td><td>Luật / nguồn chân lý?</td><td class="m">AGENTS.md · CLAUDE.md</td></tr>' +
          '<tr><td class="k">Tools</td><td>AI được phép chạy gì?</td><td class="m">.claude/settings.json</td></tr>' +
          '<tr><td class="k">Environment</td><td>Tái lập thế nào?</td><td class="m">docker-compose · .env.example · init.sh</td></tr>' +

      /* ---------- render & engine ---------- */
      const deck = document.getElementById("deck");
      deck.innerHTML = slides.join("");
      const slideEls = Array.from(deck.querySelectorAll(".slide"));
      const N = slideEls.length;
      let cur = 0;

      const counter = document.getElementById("counter");
      const progress = document.getElementById("progress");
      const prevBtn = document.getElementById("prev");
      const nextBtn = document.getElementById("next");

      function show(i) {
        cur = Math.max(0, Math.min(N - 1, i));
        slideEls.forEach((s, k) => s.classList.toggle("active", k === cur));
        counter.textContent = cur + 1 + " / " + N;
        progress.style.width = ((cur + 1) / N) * 100 + "%";
        prevBtn.disabled = cur === 0;
        nextBtn.disabled = cur === N - 1;
        const b = slideEls[cur] && slideEls[cur].querySelector(".body");
        if (b) b.scrollTop = 0;
        try {
          location.hash = "s" + (cur + 1);
        } catch (e) {}
      }
      function nextS() {
        show(cur + 1);
      }
      function prevS() {
        show(cur - 1);
      }

      prevBtn.addEventListener("click", prevS);
      nextBtn.addEventListener("click", nextS);

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
          e.preventDefault();
          nextS();
        } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
          e.preventDefault();
          prevS();
        } else if (e.key === "Home") {
          e.preventDefault();
          show(0);
        } else if (e.key === "End") {
          e.preventDefault();
          show(N - 1);
        }
      });

      /* deep-link via hash */
      (function () {
        const m = /^#s(\d+)$/.exec(location.hash);
        show(m ? parseInt(m[1], 10) - 1 : 0);
      })();
